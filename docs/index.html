    <script>
      // Safety fallback: if the unbuilt source is served directly from GitHub Pages,
      // redirect to the included docs/ production build instead of showing a blank page.
      (function () {
        function redirectSourceIndexOnGithubPages() {
          var isGithubPages = window.location.hostname.endsWith('.github.io');
          var isAlreadyDocs = window.location.pathname.indexOf('/docs/') !== -1;
          var sourceModule = document.querySelector('script[type="module"][src$="/src/main.jsx"]');
          if (isGithubPages && sourceModule && !isAlreadyDocs) {
            var path = window.location.pathname;
            var base = path.endsWith('/') ? path : path.replace(/\/[^/]*$/, '/');
            window.location.replace(base + 'docs/');
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', redirectSourceIndexOnGithubPages);
        } else {
          redirectSourceIndexOnGithubPages();
        }
      })();
    </script>
